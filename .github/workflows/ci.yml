name: CI

on:
  push:
    branches: [main, dev, assignment-8-cicd]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: make install

      - name: Run code quality checks (Linting, Formatting Check, Type Check, Pre-commit hooks)
        run: make check-all

      - name: Run tests with coverage
        run: make test-cov

  train-model:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: make install

      - name: Download & preprocess the data
        run: |
          uv run python src/load_data.py
          uv run python src/split_dataset.py --test_size 0.2

      - name: Run the training script
        run: uv run python src/train.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-model
          path: models/model.joblib

  evaluate-model:
    runs-on: ubuntu-latest
    needs: train-model

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: make install

      - name: Download & preprocess the data
        run: |
          uv run python src/load_data.py
          uv run python src/split_dataset.py --test_size 0.2

      - name: Download iris-model artifact
        uses: actions/download-artifact@v4
        with:
          name: iris-model
          path: models/

      - name: Verify model file is present
        run: ls -la models/model.joblib

      - name: Run evaluation script
        run: uv run python src/evaluate.py

      - name: Upload evaluation metrics
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-metrics
          path: data/eval.json
